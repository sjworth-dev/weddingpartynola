title: Wedding Party NOLA
description: Private properties for your wedding party. Stay together, not scattered across hotel floors.
url: "https://staytogethernola.com"
baseurl: ""
image: /assets/images/castleday-aerial.jpg
permalink: pretty

collections:
  guides:
    output: true
    permalink: /guides/:title/

defaults:
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "guide"
  - scope:
      path: ""
    values:
      image: /assets/images/castleday-aerial.jpg

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
